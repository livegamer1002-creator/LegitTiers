<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegitTiers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0f14;--bg2:#131720;--bg3:#1a1f2e;
  --surface:#161b26;--surface2:#1e2436;
  --border:#ffffff0a;--border2:#ffffff14;
  --p1:#7c3aed;--p2:#a855f7;--p3:#ec4899;
  --grad:linear-gradient(135deg,#7c3aed,#ec4899);
  --grad2:linear-gradient(90deg,#7c3aed,#a855f7,#ec4899);
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
  /* Tier colors as requested */
  --ht1:#d4a017;   /* gold */
  --lt1:#b8860b;   /* darker gold */
  --ht2:#d8d8d8;   /* light gray almost white */
  --lt2:#a0a0a0;   /* slightly darker gray */
  --ht3:#e8704a;   /* light red-orange */
  --lt3:#b84a28;   /* darker red-orange */
  --ht4:#b0b8c4;   /* light gray different hue */
  --lt4:#6a7480;   /* dark gray */
  --ht5:#c8cdd4;   /* light gray */
  --lt5:#505860;   /* dark gray */
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.bg-mesh{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 700px 500px at 15% 15%,#7c3aed07 0%,transparent 60%),
    radial-gradient(ellipse 600px 400px at 85% 85%,#ec489907 0%,transparent 60%);}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(#ffffff05 1px,transparent 1px),linear-gradient(90deg,#ffffff05 1px,transparent 1px);
  background-size:40px 40px;}

/* ── TOP NAV ── */
.top-nav{
  position:fixed;top:0;left:0;right:0;z-index:10000;
  background:rgba(13,15,20,0.96);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
}
.top-nav-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;height:70px;
}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo-img{width:52px;height:52px;object-fit:contain;flex-shrink:0;}
.nav-logo-text{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;
  background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;}
.nav-actions{display:flex;gap:8px;align-items:center;}
.nav-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;
  font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;
  border:1px solid transparent;background:transparent;text-decoration:none;white-space:nowrap;}
.nav-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface2);}
.nav-btn svg{width:14px;height:14px;flex-shrink:0;}
.btn-owner{border-color:#ec489930!important;color:#ec4899!important;}
.btn-owner:hover{background:rgba(236,72,153,0.08)!important;border-color:#ec489960!important;}
.btn-owner.logged-in{border-color:#34d39930!important;color:#34d399!important;}

/* ── MODE TABS (like MCTiers top bar) ── */
.mode-tabs-bar{
  background:rgba(13,15,20,0.98);border-bottom:1px solid var(--border2);
  position:fixed;top:70px;left:0;right:0;z-index:9999;
  overflow-x:auto;scrollbar-width:none;
}
.mode-tabs-bar::-webkit-scrollbar{display:none;}
.mode-tabs-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:stretch;padding:0 1rem;
  gap:2px;
}
.mode-tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 18px;
  cursor:pointer;transition:all .18s;
  color:var(--text3);font-size:11px;font-weight:700;letter-spacing:.3px;
  border-bottom:2px solid transparent;white-space:nowrap;
  min-width:72px;
}
.mode-tab:hover{color:var(--text2);background:rgba(255,255,255,.03);}
.mode-tab.active{color:var(--text);border-bottom-color:#7c3aed;}
.mode-tab img{width:24px;height:24px;object-fit:contain;opacity:.55;transition:opacity .18s;}
.mode-tab.active img{opacity:1;}
.mode-tab svg{width:22px;height:22px;opacity:.55;transition:opacity .18s;}
.mode-tab.active svg{opacity:1;}
.mode-tab-label{font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}

/* ── LAYOUT ── */
.layout{padding-top:128px;min-height:100vh;position:relative;z-index:1;}
.content{max-width:1200px;margin:0 auto;padding:1.5rem 1.5rem 4rem;}

/* ── COL HEADERS ── */
.col-headers{
  display:grid;grid-template-columns:80px 1fr 80px 1fr;
  padding:8px 16px;margin-bottom:4px;
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);
  border-bottom:1px solid var(--border);
}
.ch-player{padding-left:64px;}
.ch-region{text-align:center;}
.ch-tiers{text-align:right;padding-right:8px;}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:1rem;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;color:var(--text3);pointer-events:none;}
#search{width:100%;padding:10px 12px 10px 36px;background:var(--surface);border:1px solid var(--border2);
  border-radius:9px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
#search:focus{border-color:#7c3aed55;}
#search::placeholder{color:var(--text3);}

/* ── PLAYER ROW ── */
.player-row{
  display:grid;
  grid-template-columns:80px 1fr 80px 1fr;
  align-items:center;
  border-radius:10px;margin-bottom:4px;
  transition:all .15s;cursor:pointer;position:relative;overflow:hidden;
  border:1px solid var(--border);background:var(--surface);
  min-height:72px;
}
.player-row:hover{border-color:var(--border2);background:var(--surface2);}
.player-row.banned{opacity:.35;}

/* rank+avatar column */
.col-rank-avatar{
  display:flex;align-items:center;gap:0;
  height:100%;position:relative;z-index:1;
}

/* diagonal color stripe for top 3 */
.player-row.top1{border-color:rgba(212,160,23,.3);}
.player-row.top1 .col-rank-avatar::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:100%;
  background:linear-gradient(90deg,#8a6800 0%,#6b5000 50%,transparent 100%);
  clip-path:polygon(0 0,75% 0,100% 100%,0 100%);
  z-index:0;
}
.player-row.top2{border-color:rgba(180,180,200,.2);}
.player-row.top2 .col-rank-avatar::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:100%;
  background:linear-gradient(90deg,#4a5060 0%,#3a3e4a 50%,transparent 100%);
  clip-path:polygon(0 0,75% 0,100% 100%,0 100%);z-index:0;
}
.player-row.top3{border-color:rgba(160,90,30,.25);}
.player-row.top3 .col-rank-avatar::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:100%;
  background:linear-gradient(90deg,#6b3800 0%,#522c00 50%,transparent 100%);
  clip-path:polygon(0 0,75% 0,100% 100%,0 100%);z-index:0;
}

.rank-num{
  width:36px;text-align:center;flex-shrink:0;
  font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:800;color:var(--text3);
  position:relative;z-index:1;
}
.player-row.top1 .rank-num{color:#fde68a;}
.player-row.top2 .rank-num{color:#dde3ec;}
.player-row.top3 .rank-num{color:#f6c89a;}

.row-avatar{
  width:50px;height:50px;border-radius:8px;overflow:hidden;
  flex-shrink:0;position:relative;z-index:1;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));
}
.row-avatar img{width:100%;height:100%;object-fit:cover;display:block;}

/* player info column */
.col-player-info{padding:0 12px;display:flex;flex-direction:column;gap:3px;}
.row-name{font-weight:700;font-size:15px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-sub{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px;}
.row-sub svg{width:11px;height:11px;color:var(--p2);}
.banned-tag{font-size:9px;font-weight:800;background:#ff444422;border:1px solid #ff444455;
  color:#ff6666;padding:1px 5px;border-radius:3px;margin-left:4px;}

/* region column */
.col-region{display:flex;align-items:center;justify-content:center;}
.region-badge{
  padding:5px 10px;border-radius:7px;
  font-size:11px;font-weight:800;color:#fff;letter-spacing:.5px;
  text-align:center;
}
.region-EU{background:#1a4a2e;}
.region-NA{background:#4a1a1a;}
.region-AS{background:#1a2a4a;}

/* kits column — right aligned */
.col-kits{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;padding-right:12px;}

/* ── KIT BADGE — round icon + tier label below ── */
.kit-badge{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:default;
}
.kit-icon-circle{
  width:38px;height:38px;border-radius:50%;
  background:#1a1f2e;border:1.5px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;flex-shrink:0;
  overflow:hidden;
}
.kit-icon-circle img{width:22px;height:22px;object-fit:contain;}
.kit-badge:hover .kit-icon-circle{transform:translateY(-2px);}
.kit-tier-label{
  font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:900;
  letter-spacing:.3px;line-height:1;text-align:center;
  padding:2px 5px;border-radius:4px;
  min-width:28px;
}
.kit-badge.is-retired{opacity:.45;}
.kit-badge.is-retired .kit-tier-label::after{content:' R';font-size:7px;}

/* Tier colors — icon border + label color */
/* HT1: Gold */
.t-ht1 .kit-icon-circle{border-color:rgba(212,160,23,.7);background:rgba(212,160,23,.12);}
.t-ht1 .kit-tier-label{color:var(--ht1);background:rgba(212,160,23,.15);}
/* LT1: Darker gold */
.t-lt1 .kit-icon-circle{border-color:rgba(184,134,11,.7);background:rgba(184,134,11,.12);}
.t-lt1 .kit-tier-label{color:var(--lt1);background:rgba(184,134,11,.15);}
/* HT2: Light gray almost white */
.t-ht2 .kit-icon-circle{border-color:rgba(216,216,216,.5);background:rgba(216,216,216,.08);}
.t-ht2 .kit-tier-label{color:var(--ht2);background:rgba(216,216,216,.1);}
/* LT2: Slightly darker gray */
.t-lt2 .kit-icon-circle{border-color:rgba(160,160,160,.45);background:rgba(160,160,160,.07);}
.t-lt2 .kit-tier-label{color:var(--lt2);background:rgba(160,160,160,.1);}
/* HT3: Light red-orange */
.t-ht3 .kit-icon-circle{border-color:rgba(232,112,74,.6);background:rgba(232,112,74,.1);}
.t-ht3 .kit-tier-label{color:var(--ht3);background:rgba(232,112,74,.15);}
/* LT3: Darker red-orange */
.t-lt3 .kit-icon-circle{border-color:rgba(184,74,40,.6);background:rgba(184,74,40,.1);}
.t-lt3 .kit-tier-label{color:var(--lt3);background:rgba(184,74,40,.15);}
/* HT4: Light gray different hue (bluish) */
.t-ht4 .kit-icon-circle{border-color:rgba(176,184,196,.4);background:rgba(176,184,196,.07);}
.t-ht4 .kit-tier-label{color:var(--ht4);background:rgba(176,184,196,.1);}
/* LT4: Dark gray */
.t-lt4 .kit-icon-circle{border-color:rgba(106,116,128,.4);background:rgba(106,116,128,.07);}
.t-lt4 .kit-tier-label{color:var(--lt4);background:rgba(106,116,128,.1);}
/* HT5: Light gray */
.t-ht5 .kit-icon-circle{border-color:rgba(200,205,212,.35);background:rgba(200,205,212,.06);}
.t-ht5 .kit-tier-label{color:var(--ht5);background:rgba(200,205,212,.08);}
/* LT5: Dark gray */
.t-lt5 .kit-icon-circle{border-color:rgba(80,88,96,.4);background:rgba(80,88,96,.07);}
.t-lt5 .kit-tier-label{color:var(--lt5);background:rgba(80,88,96,.1);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:5rem 2rem;color:var(--text3);}
.empty-state svg{width:44px;height:44px;margin:0 auto 1rem;opacity:.2;display:block;}
.empty-state h3{font-size:17px;color:var(--text2);margin-bottom:.4rem;}

/* ── MODALS ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(6,8,14,.9);z-index:999990;
  backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
  width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:1.75rem;position:relative;}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.2rem;}
.modal-sub{color:var(--text3);font-size:12px;margin-bottom:1.25rem;}
.modal-close{position:absolute;top:.9rem;right:.9rem;background:var(--surface);
  border:1px solid var(--border2);color:var(--text2);border-radius:7px;padding:3px 9px;
  cursor:pointer;font-size:12px;transition:all .2s;}
.modal-close:hover{color:var(--text);}
.modal hr{border:none;border-top:1px solid var(--border2);margin:1rem 0;}
.modal h3{font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:600;
  color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.6rem;}
.form-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:.6rem;}
.form-row input,.form-row select,.modal input[type=email],.modal input[type=password]{
  flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);padding:9px 11px;border-radius:8px;font-size:13px;
  font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
.form-row input:focus,.form-row select:focus{border-color:#7c3aed55;}
.form-row select option{background:var(--bg2);}
.btn{padding:9px 18px;border:none;border-radius:8px;font-weight:700;font-size:13px;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;}
.btn-grad{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.25);}
.btn-grad:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(124,58,237,.35);}
.btn-red{background:linear-gradient(135deg,#ff4444,#cc2222);color:#fff;}
.btn-red:hover{transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-outline:hover{color:var(--text);background:var(--surface2);}
.btn-full{width:100%;}
.msg{padding:9px 13px;border-radius:8px;font-size:12px;margin-bottom:.6rem;display:none;}
.msg.ok{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:#34d399;display:block;}
.msg.err{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:#ff6666;display:block;}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
  width:360px;max-width:96vw;padding:1.75rem;text-align:center;}
.login-box h2{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.2rem;}
.login-box p{color:var(--text3);font-size:12px;margin-bottom:1.1rem;}
.login-box input{width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);padding:10px 12px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;
  outline:none;margin-bottom:.7rem;display:block;}
.login-err{color:#ff6666;font-size:11px;margin-top:.4rem;min-height:14px;}

@media(max-width:768px){
  .col-headers{grid-template-columns:72px 1fr 60px 1fr;}
  .player-row{grid-template-columns:72px 1fr 60px 1fr;}
  .kit-icon-circle{width:32px;height:32px;}
  .kit-icon-circle img{width:18px;height:18px;}
  .col-kits{gap:4px;}
}
@media(max-width:520px){
  .col-headers{grid-template-columns:64px 1fr 0 auto;}
  .player-row{grid-template-columns:64px 1fr 0 auto;}
  .col-region{display:none;}
  .ch-region{display:none;}
  .content{padding:1rem .75rem 4rem;}
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#ffffff10;border-radius:99px;}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<!-- TOP NAV -->
<div class="top-nav">
  <div class="top-nav-inner">
    <div class="nav-logo">
      <img class="nav-logo-img" src="logo.png" alt="LegitTiers" onerror="this.style.display='none'">
      <span class="nav-logo-text">LegitTiers</span>
    </div>
    <div class="nav-actions">
      <a class="nav-btn" href="https://discord.gg/Q7BYQDTg76" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord
      </a>
      <div class="nav-btn btn-owner" id="ownerBtn" onclick="openOwnerLogin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span id="ownerBtnLabel">Owner</span>
      </div>
    </div>
  </div>
</div>

<!-- MODE TABS -->
<div class="mode-tabs-bar">
  <div class="mode-tabs-inner" id="modeTabs">
    <div class="mode-tab active" data-mode="Overall" onclick="switchMode('Overall',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
      <span class="mode-tab-label">Overall</span>
    </div>
    <div class="mode-tab" data-mode="Sword" onclick="switchMode('Sword',this)">
      <img src="icons/sword.png" alt="Sword">
      <span class="mode-tab-label">Sword</span>
    </div>
    <div class="mode-tab" data-mode="Axe" onclick="switchMode('Axe',this)">
      <img src="icons/axe.png" alt="Axe">
      <span class="mode-tab-label">Axe</span>
    </div>
    <div class="mode-tab" data-mode="Mace" onclick="switchMode('Mace',this)">
      <img src="icons/mace.png" alt="Mace">
      <span class="mode-tab-label">Mace</span>
    </div>
    <div class="mode-tab" data-mode="Crystal" onclick="switchMode('Crystal',this)">
      <img src="icons/crystal.png" alt="Crystal">
      <span class="mode-tab-label">Crystal</span>
    </div>
    <div class="mode-tab" data-mode="UHC" onclick="switchMode('UHC',this)">
      <img src="icons/uhc.png" alt="UHC">
      <span class="mode-tab-label">UHC</span>
    </div>
    <div class="mode-tab" data-mode="Pot" onclick="switchMode('Pot',this)">
      <img src="icons/pot.png" alt="Pot">
      <span class="mode-tab-label">Pot</span>
    </div>
    <div class="mode-tab" data-mode="SMP" onclick="switchMode('SMP',this)">
      <img src="icons/smp.png" alt="SMP">
      <span class="mode-tab-label">SMP</span>
    </div>
    <div class="mode-tab" data-mode="NetheriteOP" onclick="switchMode('NetheriteOP',this)">
      <img src="icons/netheriteopt.png" alt="NethOP">
      <span class="mode-tab-label">NethOP</span>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="layout">
  <div class="content">

    <!-- Search -->
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" placeholder="Search player..." oninput="render()">
    </div>

    <!-- Column headers -->
    <div class="col-headers">
      <div>#</div>
      <div class="ch-player">Player</div>
      <div class="ch-region">Region</div>
      <div class="ch-tiers">Tiers</div>
    </div>

    <!-- Player list -->
    <div id="list"></div>

  </div>
</div>

<!-- LOGIN MODAL -->
<div class="modal-backdrop" id="loginBackdrop" onclick="bgClose('loginBackdrop',event)">
  <div class="login-box" onclick="event.stopPropagation()">
    <h2>🔐 Owner Login</h2>
    <p>Login with your owner account</p>
    <input type="email" id="loginEmail" placeholder="E-Mail" onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()">
    <input type="password" id="loginPw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-grad btn-full" onclick="doLogin()">Login</button>
    <div class="login-err" id="loginErr"></div>
    <div style="margin-top:.6rem"><button class="btn btn-outline" onclick="document.getElementById('loginBackdrop').classList.remove('open')">Cancel</button></div>
  </div>
</div>

<!-- OWNER PANEL -->
<div class="modal-backdrop" id="ownerBackdrop" onclick="bgClose('ownerBackdrop',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">⚙ Owner Panel</div>
    <div class="modal-sub" id="panel-user-info">Manage players, tiers, bans</div>
    <button class="modal-close" onclick="document.getElementById('ownerBackdrop').classList.remove('open')">✕ Close</button>
    <div id="panelMsg"></div>

    <h3>➕ Add / Update Tier</h3>
    <div class="form-row">
      <input type="text" id="f-name" placeholder="Player name">
      <select id="f-kit">
        <option>Sword</option><option>Axe</option><option>Mace</option><option>Crystal</option>
        <option>UHC</option><option>Pot</option><option>SMP</option><option>NetheriteOP</option>
      </select>
      <select id="f-tier">
        <option>HT1</option><option>LT1</option><option>HT2</option><option>LT2</option>
        <option>HT3</option><option>LT3</option><option>HT4</option><option>LT4</option>
        <option>HT5</option><option>LT5</option>
      </select>
    </div>
    <button class="btn btn-grad" onclick="addTier()">Add / Update</button>
    <hr>
    <h3>🗑 Remove Tier</h3>
    <div class="form-row">
      <select id="r-player"><option value="">— Player —</option></select>
      <select id="r-kit">
        <option>Sword</option><option>Axe</option><option>Mace</option><option>Crystal</option>
        <option>UHC</option><option>Pot</option><option>SMP</option><option>NetheriteOP</option>
      </select>
    </div>
    <button class="btn btn-red" onclick="removeTier()">Remove Tier</button>
    <hr>
    <h3>💤 Retire / Unretire Kit</h3>
    <div class="form-row">
      <select id="ret-player"><option value="">— Player —</option></select>
      <select id="ret-kit">
        <option>Sword</option><option>Axe</option><option>Mace</option><option>Crystal</option>
        <option>UHC</option><option>Pot</option><option>SMP</option><option>NetheriteOP</option>
      </select>
    </div>
    <button class="btn btn-outline" onclick="toggleRetire()">Toggle Retire</button>
    <hr>
    <h3>🚫 Ban / Unban Player</h3>
    <div class="form-row">
      <select id="ban-player"><option value="">— Player —</option></select>
    </div>
    <button class="btn btn-red" onclick="toggleBan()">Toggle Ban</button>
    <hr>
    <h3>⚠ Danger Zone</h3>
    <button class="btn btn-red" onclick="resetAll()">Reset ALL Data</button>
    <div style="margin-top:.75rem"><button class="btn btn-outline" onclick="doLogout()">🚪 Logout</button></div>
  </div>
</div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const firebaseConfig = {
  apiKey:"AIzaSyDrlGkH0_qb5-aqgAr5SURzBXs7JCSvw58",
  authDomain:"legitiers.firebaseapp.com",
  databaseURL:"https://legitiers-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"legitiers",
  storageBucket:"legitiers.firebasestorage.app",
  messagingSenderId:"459932032482",
  appId:"1:459932032482:web:a329dbf9fbe715cfe82dbb"
};
const ADMIN_UIDS = ["KGq9EmO3VkPCI8r97pPz2TkL0mk1"];

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

const KITS        = ["Sword","Axe","Mace","Crystal","UHC","Pot","SMP","NetheriteOP"];
const POINTS      = {HT1:60,LT1:45,HT2:30,LT2:20,HT3:10,LT3:6,HT4:4,LT4:3,HT5:2,LT5:1};
const TIER_ORDER  = ["HT1","LT1","HT2","LT2","HT3","LT3","HT4","LT4","HT5","LT5"];
const TITLE_BY_PTS= [[200,"Legendary"],[120,"Grand Master"],[60,"Master"],[30,"Expert"],[10,"Veteran"],[0,"Player"]];

const KICONS = {
  Sword:'icons/sword.png', Axe:'icons/axe.png', Mace:'icons/mace.png',
  Crystal:'icons/crystal.png', UHC:'icons/uhc.png', Pot:'icons/pot.png',
  SMP:'icons/smp.png', NetheriteOP:'icons/netheriteopt.png'
};

function getTitle(pts){ for(const[m,t]of TITLE_BY_PTS)if(pts>=m)return t; return"Player"; }

let players={}, currentMode="Overall", isOwner=false;

// ── AUTH ──────────────────────────────────────
onAuthStateChanged(auth, user=>{
  isOwner = !!(user && ADMIN_UIDS.includes(user.uid));
  const btn=document.getElementById("ownerBtn");
  const lbl=document.getElementById("ownerBtnLabel");
  if(isOwner){ btn.classList.add("logged-in"); lbl.textContent="Panel";
    document.getElementById("panel-user-info").textContent="Logged in as "+(user.email||""); }
  else{ btn.classList.remove("logged-in"); lbl.textContent="Owner"; }
});

// ── REALTIME LISTENER ─────────────────────────
onValue(ref(db,"players"), snap=>{
  const d=snap.val(); players={};
  if(d) Object.values(d).forEach(p=>{ players[p.name]=p; });
  render(); refreshDropdowns();
});

// ── DB HELPERS ────────────────────────────────
function dbKey(n){ return n.toLowerCase().replace(/[.#$/[\] ]/g,"_"); }
async function dbSave(p){
  if(!isOwner){ showMsg("❌ Not authorized","err"); throw new Error(); }
  await set(ref(db,"players/"+dbKey(p.name)), p);
}
async function dbDel(name){
  if(!isOwner){ showMsg("❌ Not authorized","err"); return; }
  await remove(ref(db,"players/"+dbKey(name)));
}

// ── RENDER ────────────────────────────────────
function calcPts(p){ let t=0; for(let k in p.kits) if(!(p.retired&&p.retired[k])) t+=POINTS[p.kits[k]]||0; return t; }

window.render = ()=>{
  const q=document.getElementById("search").value.toLowerCase();
  let list=Object.values(players);
  list.forEach(p=>{ p._pts=calcPts(p); });
  if(currentMode!=="Overall") list=list.filter(p=>p.kits&&p.kits[currentMode]);
  if(q) list=list.filter(p=>p.name.toLowerCase().includes(q));
  list.sort((a,b)=>{ if(a.banned&&!b.banned)return 1; if(!a.banned&&b.banned)return -1; return b._pts-a._pts; });

  if(!list.length){
    document.getElementById("list").innerHTML=`<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <h3>No players found</h3><p>Add players via the Owner Panel</p></div>`;
    return;
  }

  let html="";
  list.forEach((p,i)=>{
    const topCls = i===0?"top1":i===1?"top2":i===2?"top3":"";
    const bannedHtml = p.banned?`<span class="banned-tag">BANNED</span>`:"";
    const title = getTitle(p._pts);
    const region = p.region||"EU";
    let kitsToShow = currentMode==="Overall"
      ? KITS.filter(k=>p.kits&&p.kits[k])
      : (p.kits&&p.kits[currentMode]?[currentMode]:[]);
    kitsToShow.sort((a,b)=>TIER_ORDER.indexOf(p.kits[a])-TIER_ORDER.indexOf(p.kits[b]));

    const kitBadges = kitsToShow.map(k=>{
      const tier=p.kits[k], retired=p.retired&&p.retired[k];
      const tc="t-"+tier.toLowerCase();
      return `<div class="kit-badge ${tc}${retired?" is-retired":""}" title="${k} · ${tier} · ${POINTS[tier]||0}pts">
        <div class="kit-icon-circle">
          <img src="${KICONS[k]}" alt="${k}" onerror="this.style.opacity='.3'">
        </div>
        <div class="kit-tier-label">${tier}</div>
      </div>`;
    }).join("");

    html+=`<div class="player-row ${topCls}${p.banned?" banned":""}">
      <div class="col-rank-avatar">
        <div class="rank-num">${i+1}.</div>
        <div class="row-avatar">
          <img src="https://render.crafty.gg/3d/bust/${encodeURIComponent(p.name)}?overlay=true"
            alt="${p.name}" loading="lazy"
            onerror="this.src='https://render.crafty.gg/3d/bust/MHF_Steve?overlay=true'">
        </div>
      </div>
      <div class="col-player-info">
        <div class="row-name">${p.name}${bannedHtml}</div>
        <div class="row-sub">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
          <span>${title} (${p._pts} points)</span>
        </div>
      </div>
      <div class="col-region">
        <div class="region-badge region-${region}">${region}</div>
      </div>
      <div class="col-kits">${kitBadges}</div>
    </div>`;
  });
  document.getElementById("list").innerHTML=html;
};

// ── MODE SWITCH ───────────────────────────────
window.switchMode = (mode,el)=>{
  currentMode=mode;
  document.querySelectorAll(".mode-tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
};

// ── LOGIN ─────────────────────────────────────
window.openOwnerLogin = ()=>{
  if(isOwner){ document.getElementById("ownerBackdrop").classList.add("open"); refreshDropdowns(); return; }
  document.getElementById("loginBackdrop").classList.add("open");
  document.getElementById("loginEmail").value="";
  document.getElementById("loginPw").value="";
  document.getElementById("loginErr").textContent="";
  setTimeout(()=>document.getElementById("loginEmail").focus(),80);
};
window.doLogin = async()=>{
  const email=document.getElementById("loginEmail").value.trim();
  const pw=document.getElementById("loginPw").value;
  const errEl=document.getElementById("loginErr");
  errEl.textContent="";
  try{
    const uc=await signInWithEmailAndPassword(auth,email,pw);
    if(!ADMIN_UIDS.includes(uc.user.uid)){ await signOut(auth); errEl.textContent="❌ No admin access."; return; }
    document.getElementById("loginBackdrop").classList.remove("open");
    refreshDropdowns(); document.getElementById("ownerBackdrop").classList.add("open");
  }catch(e){ errEl.textContent="❌ "+(e.code==="auth/invalid-credential"?"Wrong email or password.":e.message); }
};
window.doLogout = async()=>{ await signOut(auth); document.getElementById("ownerBackdrop").classList.remove("open"); };
window.bgClose = (id,e)=>{ if(e.target===document.getElementById(id)) document.getElementById(id).classList.remove("open"); };

// ── OWNER PANEL ───────────────────────────────
function showMsg(t,tp){ const el=document.getElementById("panelMsg"); el.className="msg "+tp; el.textContent=t; setTimeout(()=>{el.className="msg";el.textContent="";},3500); }
function normName(n){ return n.charAt(0).toUpperCase()+n.slice(1); }

window.addTier = async()=>{
  let name=document.getElementById("f-name").value.trim();
  const kit=document.getElementById("f-kit").value, tier=document.getElementById("f-tier").value;
  if(!name){showMsg("❌ Enter a player name","err");return;}
  name=normName(name);
  const existing=Object.keys(players).find(k=>k.toLowerCase()===name.toLowerCase());
  const key=existing||name;
  if(!players[key]) players[key]={name:key,kits:{},retired:{},banned:false,region:"EU"};
  players[key].kits[kit]=tier;
  showMsg("⏳ Saving...","ok");
  await dbSave(players[key]);
  showMsg(`✅ ${key} → ${kit} ${tier}`,"ok");
};
window.removeTier = async()=>{
  const name=document.getElementById("r-player").value, kit=document.getElementById("r-kit").value;
  if(!name){showMsg("❌ Select a player","err");return;}
  if(!players[name]?.kits[kit]){showMsg("❌ No tier found","err");return;}
  delete players[name].kits[kit];
  if(players[name].retired) delete players[name].retired[kit];
  if(Object.keys(players[name].kits).length===0) await dbDel(name);
  else await dbSave(players[name]);
  showMsg(`✅ Removed ${kit} from ${name}`,"ok");
};
window.toggleRetire = async()=>{
  const name=document.getElementById("ret-player").value, kit=document.getElementById("ret-kit").value;
  if(!name||!players[name]){showMsg("❌ Select a player","err");return;}
  if(!players[name].kits[kit]){showMsg("❌ No tier in this kit","err");return;}
  if(!players[name].retired) players[name].retired={};
  players[name].retired[kit]=!players[name].retired[kit];
  await dbSave(players[name]);
  showMsg(`✅ ${name} ${kit} → ${players[name].retired[kit]?"Retired":"Active"}`,"ok");
};
window.toggleBan = async()=>{
  const name=document.getElementById("ban-player").value;
  if(!name||!players[name]){showMsg("❌ Select a player","err");return;}
  players[name].banned=!players[name].banned;
  await dbSave(players[name]);
  showMsg(`✅ ${name} → ${players[name].banned?"Banned":"Unbanned"}`,"ok");
};
window.resetAll = async()=>{
  if(!confirm("Delete ALL data?"))return; if(!confirm("Really sure?"))return;
  for(const n of Object.keys(players)) await dbDel(n);
  showMsg("✅ Cleared","ok");
};
function refreshDropdowns(){
  const names=Object.keys(players);
  ["r-player","ban-player","ret-player"].forEach(id=>{
    const sel=document.getElementById(id); if(!sel)return;
    sel.innerHTML='<option value="">— Player —</option>'+names.map(n=>`<option value="${n}">${n}${players[n].banned?" [BANNED]":""}</option>`).join("");
  });
}
</script>
</body>
</html>
